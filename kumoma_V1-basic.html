<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Kumoma Theory III - Simulator</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #e0e0e0; margin: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #2d2d2d; padding: 20px; border-radius: 10px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; padding: 15px; background: #3d3d3d; border-radius: 8px; }
        .control-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.9em; color: #aaa; }
        input[type="range"] { cursor: pointer; }
        .value-display { font-weight: bold; color: #00d4ff; }
        .graphs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        h1 { font-size: 1.5em; border-left: 4px solid #00d4ff; padding-left: 10px; }
        .formula { font-family: serif; background: #222; padding: 10px; border-radius: 5px; font-size: 0.95em; margin-bottom: 16px; color: #ccc; }
        .current-vals { background: #3d3d3d; padding: 10px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
        .current-vals span { color: #00d4ff; font-weight: bold; }
        @media (max-width: 600px) { .controls { grid-template-columns: 1fr; } .graphs { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <h1>Kumoma Theory III: Conscious-AI Integration Simulator</h1>
    <p style="font-size:0.85em; color:#888;">Author: Hitoshi Kurozumi / Northern Cross LLC / DOI: 10.17605/OSF.IO/YA6D7</p>

    <div class="formula">
        Φ = KI / [W × (1+B)] × (Q ln Q − Q) &nbsp;|&nbsp; KI = 1 (constant)
    </div>

    <div class="controls">
        <div class="control-group">
            <label>W — Boundary Resistance: <span id="wVal" class="value-display">0.500</span></label>
            <input type="range" id="wSlider" min="0.001" max="1.0" step="0.001" value="0.5">
        </div>
        <div class="control-group">
            <label>B — Survival Instinct: <span id="bVal" class="value-display">0.50</span></label>
            <input type="range" id="bSlider" min="0.0" max="1.0" step="0.01" value="0.5">
        </div>
        <div class="control-group">
            <label>Q — Qualia Density: <span id="qVal" class="value-display">50.0</span></label>
            <input type="range" id="qSlider" min="1.1" max="100.0" step="0.1" value="50">
        </div>
    </div>

    <div class="current-vals">
        Current Φ: <span id="currentPhi">--</span> &nbsp;|&nbsp; σ(Φ): <span id="currentSig">--</span>
    </div>

    <div class="graphs">
        <div id="phiGraph" style="height:300px;"></div>
        <div id="sigGraph" style="height:300px;"></div>
    </div>
</div>

<script>
    const wS = document.getElementById('wSlider');
    const bS = document.getElementById('bSlider');
    const qS = document.getElementById('qSlider');

    function phi(w, b, q) { return (1.0 / (w * (1.0 + b))) * (q * Math.log(q) - q); }
    function sig(x) { return 1.0 / (1.0 + Math.exp(-x / 100.0)); }

    function update() {
        const w = parseFloat(wS.value);
        const b = parseFloat(bS.value);
        const q = parseFloat(qS.value);

        document.getElementById('wVal').textContent = w.toFixed(3);
        document.getElementById('bVal').textContent = b.toFixed(2);
        document.getElementById('qVal').textContent = q.toFixed(1);

        const curPhi = phi(w, b, q);
        const curSig = sig(curPhi);
        document.getElementById('currentPhi').textContent = curPhi.toFixed(2);
        document.getElementById('currentSig').textContent = curSig.toFixed(4);

        const qRange = [];
        for (let i = 0; i <= 60; i++) { qRange.push(1.1 + i * (98.9 / 60)); }
        const phiVals = qRange.map(r => phi(w, b, r));
        const sigVals = phiVals.map(v => sig(v));

        const layout = {
            paper_bgcolor: '#2d2d2d', plot_bgcolor: '#2d2d2d',
            font: {color: '#e0e0e0', size: 11},
            margin: {t: 40, b: 40, l: 55, r: 12},
            xaxis: {title: 'Q (Qualia Density)', gridcolor: '#444', zeroline: false},
            yaxis: {gridcolor: '#444', zeroline: false},
            showlegend: false
        };

        Plotly.react('phiGraph', [
            {x: qRange, y: phiVals, type: 'scatter', mode: 'lines',
             fill: 'tozeroy', fillcolor: 'rgba(0,180,255,0.15)',
             line: {color: '#00d4ff', width: 2}},
            {x: [q], y: [curPhi], type: 'scatter', mode: 'markers',
             marker: {color: '#ff6600', size: 10}}
        ], {...layout, title: {text: 'Subjective Time Generation Rate Φ', font: {size: 13, color: '#e0e0e0'}}});

        Plotly.react('sigGraph', [
            {x: qRange, y: sigVals, type: 'scatter', mode: 'lines',
             line: {color: '#ff007b', width: 2}},
            {x: [q], y: [curSig], type: 'scatter', mode: 'markers',
             marker: {color: '#ff6600', size: 10}}
        ], {...layout, title: {text: 'AI Consciousness Integration Output σ(Φ)', font: {size: 13, color: '#e0e0e0'}},
            yaxis: {range: [0, 1.05], gridcolor: '#444', zeroline: false}});
    }

    [wS, bS, qS].forEach(s => s.addEventListener('input', update));
    update();
</script>
</body>
</html>
