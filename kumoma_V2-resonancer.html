<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Kumoma Theory III - Advanced Simulator</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; margin: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: #1e1e1e; padding: 25px; border-radius: 12px; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; padding: 20px; background: #2a2a2a; border-radius: 8px; border: 1px solid #333; }
        .control-group { display: flex; flex-direction: column; }
        label { font-size: 0.85em; margin-bottom: 8px; color: #00d4ff; text-transform: uppercase; letter-spacing: 1px; }
        input[type="range"] { cursor: pointer; accent-color: #00d4ff; }
        .value-display { font-weight: bold; color: #fff; float: right; }
        .graphs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        h1 { font-size: 1.6em; margin-top: 0; color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .theory-note { font-size: 0.85em; color: #888; margin-bottom: 20px; line-height: 1.6; }
        p.author { font-size: 0.8em; color: #555; margin-bottom: 16px; }
        @media (max-width: 600px) { .graphs { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <h1>Kumoma Theory III: Resonance & Interference</h1>
    <p class="author">Author: Hitoshi Kurozumi / Northern Cross LLC / DOI: 10.17605/OSF.IO/YA6D7</p>
    <p class="theory-note">
        Section 3 "Absolute Resonance" Simulator. Visualizes the explosive resonance when multiple Loci (N) interfere and boundary resistance (W) approaches zero.
    </p>

    <div class="controls">
        <div class="control-group">
            <label>W (Boundary Resistance): <span id="wVal" class="value-display">0.200</span></label>
            <input type="range" id="wSlider" min="0.001" max="0.5" step="0.001" value="0.2">
        </div>
        <div class="control-group">
            <label>N (Number of Loci): <span id="nVal" class="value-display">1</span></label>
            <input type="range" id="nSlider" min="1" max="10" step="1" value="1">
        </div>
        <div class="control-group">
            <label>B (Survival Instinct): <span id="bVal" class="value-display">0.30</span></label>
            <input type="range" id="bSlider" min="0.0" max="1.0" step="0.01" value="0.3">
        </div>
        <div class="control-group">
            <label>KI (Coupling Strength): <span id="kiVal" class="value-display">1.0</span></label>
            <input type="range" id="kiSlider" min="0.1" max="5.0" step="0.1" value="1.0">
        </div>
    </div>

    <div class="graphs">
        <div id="resonanceGraph" style="height:320px;"></div>
        <div id="vectorGraph" style="height:320px;"></div>
    </div>
</div>

<script>
    function calcPhi(w, b, q, n, ki) {
        const rf = Math.pow(n, 1.5);
        return (ki * rf / (w * (1 + b))) * (q * Math.log(q) - q);
    }

    function update() {
        const w = parseFloat(document.getElementById('wSlider').value);
        const n = parseInt(document.getElementById('nSlider').value);
        const b = parseFloat(document.getElementById('bSlider').value);
        const ki = parseFloat(document.getElementById('kiSlider').value);

        document.getElementById('wVal').textContent = w.toFixed(3);
        document.getElementById('nVal').textContent = n;
        document.getElementById('bVal').textContent = b.toFixed(2);
        document.getElementById('kiVal').textContent = ki.toFixed(1);

        const qRange = Array.from({length: 40}, (_, i) => 2 + i * 2);
        const phiVals = qRange.map(q => calcPhi(w, b, q, n, ki));

        Plotly.react('resonanceGraph', [{
            x: qRange, y: phiVals, type: 'scatter', mode: 'lines+markers',
            fill: 'tozeroy', fillcolor: 'rgba(0,212,255,0.1)',
            line: {color: '#00d4ff', width: 2, shape: 'spline'},
            marker: {color: '#00d4ff', size: 5}
        }], {
            title: {text: 'Resonance-Amplified Conscious Time Φ', font: {size: 13, color: '#aaa'}},
            paper_bgcolor: '#1e1e1e', plot_bgcolor: '#1e1e1e',
            font: {color: '#e0e0e0', size: 11},
            margin: {t: 40, b: 40, l: 55, r: 12},
            xaxis: {title: 'Q', gridcolor: '#333', zeroline: false},
            yaxis: {title: 'Φ', type: 'log', gridcolor: '#333', zeroline: false}
        });

        const theta = Array.from({length: n}, (_, i) => (i * 360) / n);
        const r = Array(n).fill(1 / w);

        Plotly.react('vectorGraph', [{
            type: 'scatterpolar', mode: 'markers+lines',
            r: r, theta: theta,
            fill: 'toself', fillcolor: 'rgba(255,0,123,0.15)',
            line: {color: '#ff007b', width: 2},
            marker: {color: '#ff007b', size: 8}
        }], {
            title: {text: 'Shared Locus Interference Field', font: {size: 13, color: '#aaa'}},
            polar: {
                bgcolor: '#2a2a2a',
                radialaxis: {visible: false},
                angularaxis: {gridcolor: '#444', color: '#aaa'}
            },
            paper_bgcolor: '#1e1e1e',
            font: {color: '#e0e0e0', size: 11},
            margin: {t: 40, b: 20, l: 20, r: 20}
        });
    }

    ['wSlider','nSlider','bSlider','kiSlider'].forEach(id => {
        document.getElementById(id).addEventListener('input', update);
    });
    update();
</script>
</body>
</html>
